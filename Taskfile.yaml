version: '3'

vars:
  BINARY: liteclaw
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
  LDFLAGS: >-
    -s -w
    -X main.version={{.VERSION}}
    -X main.commit={{.COMMIT}}

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the binary
    cmds:
      - go build -ldflags '{{.LDFLAGS}}' -o bin/{{.BINARY}} ./cmd/liteclaw
    sources:
      - '**/*.go'
    generates:
      - bin/{{.BINARY}}

  run:
    desc: Build and run with args
    cmds:
      - go run -ldflags '{{.LDFLAGS}}' ./cmd/liteclaw {{.CLI_ARGS}}

  test:
    desc: Run all tests
    cmds:
      - go test -race -count=1 ./...

  test:cover:
    desc: Run tests with coverage
    cmds:
      - go test -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run linters
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    cmds:
      - gofumpt -w .
      - goimports -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ dist/ coverage.out coverage.html

  check:
    desc: Run all checks (fmt, vet, lint, test)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  release:snapshot:
    desc: Build a snapshot release
    cmds:
      - goreleaser release --snapshot --clean

  install:
    desc: Install to $GOPATH/bin
    cmds:
      - go install -ldflags '{{.LDFLAGS}}' ./cmd/liteclaw
