version: 2

project_name: liteclaw

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - main: ./cmd/liteclaw
    binary: liteclaw
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

archives:
  - format: tar.gz
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

brews:
  - repository:
      owner: marsstein
      name: homebrew-tap
    homepage: https://liteclaw.dev
    description: Lightweight, secure, multi-agent AI runtime
    license: Apache-2.0
    install: |
      bin.install "liteclaw"

nfpms:
  - package_name: liteclaw
    homepage: https://liteclaw.dev
    description: Lightweight, secure, multi-agent AI runtime
    license: Apache-2.0
    formats:
      - deb
      - rpm

dockers:
  - image_templates:
      - 'ghcr.io/marsstein/liteclaw:{{ .Version }}'
      - 'ghcr.io/marsstein/liteclaw:latest'
    dockerfile: Dockerfile
    build_flag_templates:
      - '--platform=linux/amd64'
