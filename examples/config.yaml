# MarsClaw configuration example
# Copy to ~/.marsclaw/config.yaml

providers:
  # Pick your default provider
  default: gemini
  gemini:
    api_key_env: GEMINI_API_KEY
    default_model: gemini-2.5-flash
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    default_model: claude-sonnet-4-20250514
  openai:
    api_key_env: OPENAI_API_KEY
    default_model: gpt-4o
  ollama:
    # Fully offline — no internet, no API key, no cost
    # Install: curl -fsSL https://ollama.com/install.sh | sh
    # Pull model: ollama pull llama3.1
    default_model: llama3.1

agent:
  max_turns: 25
  max_consecutive_tool_calls: 15
  max_input_tokens: 180000
  max_output_tokens: 16384
  enable_streaming: true

cost:
  inline_display: true
  daily_budget: 10.00

security:
  strict_approval: false
  scan_credentials: true
  path_traversal_guard: true
  allowed_dirs:
    - /home/user/projects

